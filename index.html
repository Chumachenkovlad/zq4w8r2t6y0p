<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Командний центр</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f;
    --bg2:#0f0f18;
    --surface:#16161f;
    --surface2:#1c1c28;
    --line:#262635;
    --txt:#e9ecf3;
    --muted:#8d93a6;
    --accent:#7c6af7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:
      radial-gradient(1100px 520px at 12% -10%, rgba(124,106,247,.10), transparent 60%),
      radial-gradient(900px 480px at 95% 0%, rgba(45,212,191,.06), transparent 55%),
      var(--bg);
    color:var(--txt);
    font-family:'Manrope',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding:0 0 80px;
  }
  .accent-bar{height:4px;background:linear-gradient(90deg,#5b8cff,#ff5470,#ff9447,#2dd4bf,#f5c451)}
  .wrap{max-width:1100px;margin:0 auto;padding:0 20px}

  header.top{padding:48px 0 8px}
  .kicker{font-family:'JetBrains Mono',monospace;letter-spacing:.22em;text-transform:uppercase;font-size:12px;color:var(--muted)}
  .kicker b{color:var(--accent);font-weight:500}
  h1{font-family:'Oswald';font-weight:700;font-size:clamp(30px,6vw,52px);line-height:1;text-transform:uppercase;letter-spacing:.01em;margin:10px 0 12px}
  .sub{color:var(--muted);font-size:15px;max-width:620px;line-height:1.55}
  .updated{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:14px;opacity:.8}

  .group{margin-top:44px}
  .group-head{display:flex;align-items:baseline;gap:12px;margin-bottom:18px;border-bottom:1px solid var(--line);padding-bottom:10px}
  .group-head h2{font-family:'Oswald';font-weight:600;font-size:20px;text-transform:uppercase;letter-spacing:.04em}
  .group-head .note{color:var(--muted);font-size:13px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .grid.featured{grid-template-columns:1fr}

  .card{
    position:relative;display:flex;flex-direction:column;
    background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:22px;text-decoration:none;color:inherit;overflow:hidden;
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
  }
  .card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c,var(--accent))}
  .card:hover{transform:translateY(-3px);border-color:var(--c,var(--accent));background:var(--surface2)}
  .card .meta{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--c,var(--accent));margin-bottom:10px}
  .card h3{font-family:'Oswald';font-weight:600;font-size:22px;line-height:1.08;margin-bottom:10px}
  .card p{color:var(--muted);font-size:14px;line-height:1.55;flex:1}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
  .tag{font-size:11px;font-weight:600;color:var(--c,var(--accent));background:color-mix(in srgb,var(--c,var(--accent)) 14%,transparent);border:1px solid color-mix(in srgb,var(--c,var(--accent)) 30%,transparent);padding:3px 9px;border-radius:6px}
  .go{margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--c,var(--accent));display:flex;align-items:center;gap:6px;opacity:.85}
  .card.big h3{font-size:clamp(24px,4vw,32px)}
  .card.big p{font-size:15px;max-width:680px}

  footer{margin-top:56px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);font-size:12px;text-align:center}
  footer a{color:var(--muted)}

  @media (max-width:560px){ header.top{padding:34px 0 8px} }
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="wrap">
  <header class="top">
    <div class="kicker"><b>VC</b> · Особистий хаб</div>
    <h1 id="h-title">Командний центр</h1>
    <p class="sub" id="h-sub">Тренування, плани та розклади — усе в одному місці.</p>
    <div class="updated" id="h-updated"></div>
  </header>

  <main id="content"></main>

  <footer>
    Приватний збір сторінок · <span id="f-updated"></span> · усі сторінки <code>noindex</code>
  </footer>
</div>

<script>
// Вбудована копія маніфесту — резервний варіант, якщо fetch недоступний (напр. file://).
const FALLBACK = {"title":"Командний центр","subtitle":"Тренування, плани та розклади — усе в одному місці.","updated":"2026-06-16","groups":[{"id":"schedule","label":"Розклад","note":"Як усе складається в тиждень"},{"id":"training","label":"Тренувальні плани","note":"Деталі по дисциплінах"}],"items":[{"id":"schedule","group":"schedule","file":"schedule.html","title":"Тренувальний тиждень · Варіант Б","summary":"Майстер-розклад на тиждень, що звʼязує всі активності.","tags":["Силове","Бокс","Баскетбол","Скейт","Водіння"],"meta":"Тижневий план · .ics","accent":"#5b8cff","featured":true},{"id":"kf800","group":"training","file":"kf800.html","title":"KF800 · 8 тижнів","summary":"Силова програма на 8 тижнів.","tags":["Сила"],"meta":"Силова програма","accent":"#5b8cff"},{"id":"basketball","group":"training","file":"basketball.html","title":"Basketball Training Plan","summary":"4 тижні, 3 тренування.","tags":["Баскетбол"],"meta":"Майданчик + мʼяч","accent":"#ff9447"},{"id":"skate","group":"training","file":"skate-plan.html","title":"Скейт-план","summary":"Beginner → Trick.","tags":["Скейт"],"meta":"Beginner → Trick","accent":"#2dd4bf"}]};

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function card(it){
  const big = it.featured ? ' big' : '';
  const tags = (it.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
  return `<a class="card${big}" href="${esc(it.file)}" style="--c:${esc(it.accent||'#7c6af7')}">
    ${it.meta?`<div class="meta">${esc(it.meta)}</div>`:''}
    <h3>${esc(it.title)}</h3>
    <p>${esc(it.summary||'')}</p>
    ${tags?`<div class="tags">${tags}</div>`:''}
    <div class="go">Відкрити →</div>
  </a>`;
}

function render(data){
  document.getElementById('h-title').textContent = data.title || 'Командний центр';
  document.getElementById('h-sub').textContent = data.subtitle || '';
  const upd = data.updated ? 'Оновлено: '+data.updated : '';
  document.getElementById('h-updated').textContent = upd;
  document.getElementById('f-updated').textContent = upd;

  const items = data.items || [];
  // Зберігаємо порядок груп з маніфесту; групи без items пропускаємо.
  const groups = data.groups && data.groups.length
    ? data.groups
    : [...new Set(items.map(i=>i.group))].map(id=>({id,label:id}));

  const html = groups.map(g=>{
    const gi = items.filter(i=>(i.group||'other')===g.id);
    if(!gi.length) return '';
    const featured = gi.some(i=>i.featured);
    return `<section class="group">
      <div class="group-head"><h2>${esc(g.label||g.id)}</h2>${g.note?`<span class="note">${esc(g.note)}</span>`:''}</div>
      <div class="grid${featured?' featured':''}">${gi.map(card).join('')}</div>
    </section>`;
  }).join('');
  document.getElementById('content').innerHTML = html;
}

fetch('content.json', {cache:'no-store'})
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(()=>render(FALLBACK));
</script>
</body>
</html>
